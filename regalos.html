<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listado interno de regalos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --ok-bg: #ecfdf5;
      --ok-text: #166534;
      --warn-bg: #f3f4f6;
      --warn-text: #374151;
      --danger-bg: #fef2f2;
      --danger-text: #991b1b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero,
    .panel,
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .panel {
      padding: 16px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
    }

    .search:focus {
      border-color: #c4b5fd;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #ede9fe;
      color: #5b21b6;
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      background: var(--primary);
      color: white;
    }

    .btn:hover { background: var(--primary-dark); }

    .message {
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 0.95rem;
      display: none;
      margin-bottom: 16px;
    }

    .message.show { display: block; }
    .message.ok { background: var(--ok-bg); color: var(--ok-text); }
    .message.error { background: var(--danger-bg); color: var(--danger-text); }
    .message.info { background: var(--warn-bg); color: var(--warn-text); }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 0.95rem;
    }

    th {
      position: sticky;
      top: 0;
      background: #fafafa;
      z-index: 1;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
    }

    tr:hover td {
      background: #fcfcff;
    }

    .gift-name {
      font-weight: 700;
      color: var(--text);
    }

    .muted {
      color: var(--muted);
    }

    .link {
      color: #5b21b6;
      text-decoration: none;
      font-weight: 600;
    }

    .link:hover {
      text-decoration: underline;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .wrap {
        padding: 16px;
      }

      h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Listado interno de regalos reservados</h1>
      <p class="sub">
        Vista interna para revisar quién reservó cada regalo, con búsqueda rápida y enlace de referencia cuando exista.
      </p>
    </section>

    <div class="message" id="globalMessage"></div>

    <div class="toolbar">
      <div class="panel">
        <input class="search" id="searchInput" placeholder="Buscar por regalo, nombre, apellido o contacto" />
      </div>
      <div class="badge" id="summaryBadge">Cargando...</div>
      <button class="btn" id="refreshBtn" type="button">Actualizar</button>
    </div>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Regalo</th>
            <th>Unidad</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Contacto</th>
            <th>Fecha reserva</th>
            <th>Referencia</th>
          </tr>
        </thead>
        <tbody id="reservationTableBody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none;">No hay reservas para mostrar.</div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = 'https://wxbxhntsyrigsgkyfczi.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_BkjlR_5-FZihiX3PynHenA_-20x-HK-';

    const globalMessage = document.getElementById('globalMessage');
    const summaryBadge = document.getElementById('summaryBadge');
    const refreshBtn = document.getElementById('refreshBtn');
    const searchInput = document.getElementById('searchInput');
    const reservationTableBody = document.getElementById('reservationTableBody');
    const emptyState = document.getElementById('emptyState');

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allRows = [];

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function showMessage(text, type) {
      const safeType = type || 'info';
      globalMessage.textContent = text;
      globalMessage.className = 'message show ' + safeType;
    }

    function hideMessage() {
      globalMessage.textContent = '';
      globalMessage.className = 'message';
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('es-CL');
    }

    function renderRows(rows) {
      summaryBadge.textContent = 'Reservas: ' + rows.length;

      if (!rows.length) {
        reservationTableBody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      reservationTableBody.innerHTML = rows.map(function (row) {
        const referenceHtml = row.reference_url
          ? '<a class="link" href="' + escapeHtml(row.reference_url) + '" target="_blank" rel="noopener noreferrer">Abrir</a>'
          : '<span class="muted">-</span>';

        return [
          '<tr>',
            '<td><div class="gift-name">' + escapeHtml(row.gift_name) + '</div></td>',
            '<td>' + escapeHtml(row.unit_number) + '</td>',
            '<td>' + escapeHtml(row.person_name) + '</td>',
            '<td>' + escapeHtml(row.person_last_name) + '</td>',
            '<td>' + escapeHtml(row.person_contact || '-') + '</td>',
            '<td>' + escapeHtml(formatDate(row.created_at)) + '</td>',
            '<td>' + referenceHtml + '</td>',
          '</tr>'
        ].join('');
      }).join('');
    }

    function applyFilter() {
      const term = searchInput.value.trim().toLowerCase();
      if (!term) {
        renderRows(allRows);
        return;
      }

      const filtered = allRows.filter(function (row) {
        return [
          row.gift_name,
          row.person_name,
          row.person_last_name,
          row.person_contact
        ].some(function (value) {
          return String(value || '').toLowerCase().includes(term);
        });
      });

      renderRows(filtered);
    }

    async function loadReservations() {
      hideMessage();
      summaryBadge.textContent = 'Cargando...';

      const response = await supabaseClient
        .from('reservations')
        .select(`
          id,
          person_name,
          person_last_name,
          person_contact,
          created_at,
          gift_items (
            unit_number,
            gift_groups (
              name,
              reference_url
            )
          )
        `)
        .eq('is_active', true)
        .order('created_at', { ascending: false });

      if (response.error) {
        showMessage('No se pudo cargar el listado interno.', 'error');
        console.error(response.error);
        return;
      }

      allRows = (response.data || []).map(function (item) {
        const giftItem = item.gift_items || {};
        const giftGroup = giftItem.gift_groups || {};

        return {
          reservation_id: item.id,
          person_name: item.person_name,
          person_last_name: item.person_last_name,
          person_contact: item.person_contact,
          created_at: item.created_at,
          unit_number: giftItem.unit_number || '-',
          gift_name: giftGroup.name || 'Sin nombre',
          reference_url: giftGroup.reference_url || null
        };
      });

      applyFilter();
      showMessage('Listado actualizado.', 'ok');
    }

    searchInput.addEventListener('input', applyFilter);
    refreshBtn.addEventListener('click', loadReservations);

    loadReservations();
  </script>
</body>
</html>
